name: App steuern

on:
  workflow_dispatch:
    inputs:
      aktion:
        description: 'Was soll passieren?'
        required: true
        type: choice
        options: [status, start, stop, restart]
        default: status

jobs:
  control:
    runs-on: ubuntu-latest
    steps:
      - name: Befehl auf dem Server ausführen
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/trinkgeld-rechner
            case "${{ github.event.inputs.aktion }}" in
              start)   /usr/bin/docker compose up -d ;;
              stop)    /usr/bin/docker compose stop ;;
              restart) /usr/bin/docker compose restart ;;
            esac
            /usr/bin/docker compose ps