name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: app

      - name: Run tests
        run: npx ng test --no-watch --reporters=json --output-file=test-results.json --reporters=verbose
        working-directory: app

      - name: Generate test summary
        if: always()
        run: node .github/scripts/generate-test-summary.mjs app/test-results.json >> $GITHUB_STEP_SUMMARY

      - name: Production build
        run: npx ng build --configuration production
        working-directory: app
