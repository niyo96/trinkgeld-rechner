name: App Status

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Container prüfen
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/trinkgeld-rechner
            if /usr/bin/docker compose ps --status running --quiet | grep -q .; then
              echo "App läuft ✅"
            else
              echo "App läuft NICHT ❌"
              exit 1
            fi